<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#02060a"/>
      <stop offset="100%" style="stop-color:#060f18"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6d00"/>
      <stop offset="100%" style="stop-color:#ffb300"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00b2cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.6"/>
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="18" fill="#ff6d00"/>
  <!-- Crosshair H -->
  <line x1="60" y1="256" x2="156" y2="256" stroke="url(#cross)" stroke-width="6" stroke-linecap="round"/>
  <line x1="356" y1="256" x2="452" y2="256" stroke="url(#cross)" stroke-width="6" stroke-linecap="round"/>
  <!-- Crosshair V -->
  <line x1="256" y1="60" x2="256" y2="156" stroke="url(#cross)" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="356" x2="256" y2="452" stroke="url(#cross)" stroke-width="6" stroke-linecap="round"/>
  <!-- Text OMAD -->
  <text x="256" y="160" font-family="Arial Black,sans-serif" font-size="64" font-weight="900" fill="#ff6d00" text-anchor="middle" letter-spacing="6">OMAD</text>
  <!-- Text SNIPER -->
  <text x="256" y="390" font-family="Arial,sans-serif" font-size="36" font-weight="700" fill="#00e5ff" text-anchor="middle" letter-spacing="8">SNIPER</text>
  <!-- Glow effect center -->
  <circle cx="256" cy="256" r="18" fill="#ff6d00" opacity="0.4" filter="blur(8px)"/>
</svg>